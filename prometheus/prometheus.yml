global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  # - "first_rules.yml"
  # - "second_rules.yml"

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # MongoDB Exporter
  - job_name: 'mongodb'
    metrics_path: /metrics
    static_configs:
      - targets: ['mongodb-exporter:9216']  # ⚠️ Используем имя сервиса и порт 9216!
    scrape_interval: 30s
    scrape_timeout: 10s